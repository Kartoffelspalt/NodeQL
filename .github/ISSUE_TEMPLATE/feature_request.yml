name: Feature request
description: Propose a focused improvement to NodeQL.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Explain the user problem rather than only the proposed implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: offline
    attributes:
      label: Local-first impact
      description: Describe network, privacy, storage, and offline implications.
    validations:
      required: true
