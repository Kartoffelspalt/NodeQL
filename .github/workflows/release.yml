name: Desktop Release

on:
  push:
    branches: [master, main]
    paths:
      - 'pubspec.yaml'
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.44.1'
  TRANSLATION_MANIFEST_URL: https://kartoffelspalt.github.io/NodeQL/translations/translation-manifest.json
  TRANSLATION_CONTRIBUTION_URL: https://github.com/Kartoffelspalt/NodeQL/blob/master/docs/localization/README.md

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should-release: ${{ steps.release.outputs.should-release }}
    steps:
      - uses: actions/checkout@v4
      - name: Read and validate version
        id: version
        shell: bash
        run: |
          PUBSPEC_VERSION="$(sed -n 's/^version: *//p' pubspec.yaml)"
          RELEASE_VERSION="${PUBSPEC_VERSION%%+*}"
          BUILD_NUMBER="${PUBSPEC_VERSION#*+}"
          test -n "${RELEASE_VERSION}"
          test "${BUILD_NUMBER}" != "${PUBSPEC_VERSION}"
          [[ "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          [[ "${BUILD_NUMBER}" =~ ^[0-9]+$ ]]
          echo "version=${RELEASE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${RELEASE_VERSION}" >> "${GITHUB_OUTPUT}"
      - name: Check whether release already exists
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists; nothing to publish."
            echo "should-release=false" >> "${GITHUB_OUTPUT}"
          else
            echo "should-release=true" >> "${GITHUB_OUTPUT}"
          fi

  quality:
    name: Quality gates
    needs: prepare
    if: needs.prepare.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: dart format --output=none --set-exit-if-changed lib test tool
      - run: flutter analyze
      - run: flutter test
      - run: dart run tool/validate_translations.dart

  build-linux:
    name: Linux x64
    needs: [prepare, quality]
    if: needs.prepare.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libsqlite3-dev ninja-build
      - run: flutter pub get
      - name: Build Linux bundle
        run: >
          flutter build linux --release
          --dart-define=NODEQL_RELEASE_OWNER=${{ github.repository_owner }}
          --dart-define=NODEQL_RELEASE_REPOSITORY=${{ github.event.repository.name }}
          --dart-define=NODEQL_TRANSLATION_MANIFEST_URL=${{ env.TRANSLATION_MANIFEST_URL }}
          --dart-define=NODEQL_TRANSLATION_CONTRIBUTION_URL=${{ env.TRANSLATION_CONTRIBUTION_URL }}
      - name: Package Linux bundle and Debian package
        shell: bash
        run: |
          PUBSPEC_VERSION="$(sed -n 's/^version: *//p' pubspec.yaml)"
          RELEASE_VERSION="${PUBSPEC_VERSION%%+*}"
          tar -C build/linux/x64/release/bundle -czf "nodeql-linux-x64-${RELEASE_VERSION}.tar.gz" .
          mkdir -p package/DEBIAN package/usr/lib/nodeql package/usr/bin package/usr/share/applications
          cp -R build/linux/x64/release/bundle/. package/usr/lib/nodeql/
          ln -s /usr/lib/nodeql/nodeql package/usr/bin/nodeql
          cat > package/DEBIAN/control <<EOF
          Package: nodeql
          Version: ${RELEASE_VERSION}
          Section: devel
          Priority: optional
          Architecture: amd64
          Maintainer: NodeQL Team <nodeql-support@codespiresolutions.digital>
          Depends: libc6, libstdc++6, libgtk-3-0, libsqlite3-0
          Homepage: https://github.com/${{ github.repository }}
          Description: Local-first visual SQL learning and development
          EOF
          cat > package/usr/share/applications/nodeql.desktop <<EOF
          [Desktop Entry]
          Name=NodeQL
          Comment=Visual SQL learning and development
          Exec=/usr/bin/nodeql
          Terminal=false
          Type=Application
          Categories=Development;Education;
          EOF
          dpkg-deb --build --root-owner-group package "nodeql_${RELEASE_VERSION}_amd64.deb"
      - uses: actions/upload-artifact@v7
        with:
          name: nodeql-linux
          path: |
            nodeql-linux-x64-*.tar.gz
            nodeql_*_amd64.deb
          if-no-files-found: error

  build-macos:
    name: macOS
    needs: [prepare, quality]
    if: needs.prepare.outputs.should-release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build macOS application
        run: >
          flutter build macos --release
          --dart-define=NODEQL_RELEASE_OWNER=${{ github.repository_owner }}
          --dart-define=NODEQL_RELEASE_REPOSITORY=${{ github.event.repository.name }}
          --dart-define=NODEQL_TRANSLATION_MANIFEST_URL=${{ env.TRANSLATION_MANIFEST_URL }}
          --dart-define=NODEQL_TRANSLATION_CONTRIBUTION_URL=${{ env.TRANSLATION_CONTRIBUTION_URL }}
      - name: Package macOS application
        shell: bash
        run: |
          PUBSPEC_VERSION="$(sed -n 's/^version: *//p' pubspec.yaml)"
          RELEASE_VERSION="${PUBSPEC_VERSION%%+*}"
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/NodeQL.app \
            "nodeql-macos-${RELEASE_VERSION}.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: nodeql-macos
          path: nodeql-macos-*.zip
          if-no-files-found: error

  build-windows:
    name: Windows x64
    needs: [prepare, quality]
    if: needs.prepare.outputs.should-release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build Windows bundle
        run: >
          flutter build windows --release
          --dart-define=NODEQL_RELEASE_OWNER=${{ github.repository_owner }}
          --dart-define=NODEQL_RELEASE_REPOSITORY=${{ github.event.repository.name }}
          --dart-define=NODEQL_TRANSLATION_MANIFEST_URL=${{ env.TRANSLATION_MANIFEST_URL }}
          --dart-define=NODEQL_TRANSLATION_CONTRIBUTION_URL=${{ env.TRANSLATION_CONTRIBUTION_URL }}
      - name: Package Windows bundle
        shell: pwsh
        run: |
          $pubspecVersion = (Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$').Matches.Groups[1].Value
          $releaseVersion = $pubspecVersion.Split('+')[0]
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "nodeql-windows-x64-$releaseVersion.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: nodeql-windows
          path: nodeql-windows-x64-*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: [prepare, build-linux, build-macos, build-windows]
    if: >-
      ${{
        always() &&
        needs.prepare.outputs.should-release == 'true' &&
        needs.build-linux.result == 'success' &&
        needs.build-macos.result == 'success' &&
        needs.build-windows.result == 'success'
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: cd artifacts && sha256sum * > SHA256SUMS.txt
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          gh release create "${RELEASE_TAG}" artifacts/* \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --generate-notes \
            --title "NodeQL ${RELEASE_VERSION}"
