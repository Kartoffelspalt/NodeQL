name: Flutter Release

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'pubspec.yaml'

permissions:
  contents: write

jobs:
  check-version:
    name: Check Version Update
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should-release: ${{ steps.check.outputs.should-release }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //g')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if gh release view "v$VERSION" 2>/dev/null; then
            echo "should-release=false" >> $GITHUB_OUTPUT
          else
            echo "should-release=true" >> $GITHUB_OUTPUT
          fi

  build-linux:
    name: Build Linux (Debian)
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev pkg-config cmake ninja-build

      - name: Build Linux Release
        run: flutter build linux --release

      - name: Generate Debian control file
        uses: Nightwind-Developments/debian-control-file-builder@latest
        id: deb_control
        with:
          config-file: 'linux/debian/control_config.json'
          deps-file: 'linux/debian/dependencies.txt'
          output-path: 'linux/debian/'
          case-sensitive-keys: 'false'

      - name: Fix control file formatting
        run: |
          sed -i 's/Homepage:/\nHomepage:/' linux/debian/control

      - name: Update Debian control file version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //g')
          sed -i "s/^Version: .*/Version: $VERSION/" linux/debian/control

      - name: Debug generated control file
        run: cat linux/debian/control

      - name: Create Debian package directory structure
        run: |
          mkdir -p debian/DEBIAN
          mkdir -p debian/usr/local/bin/scratchql-creater
          cp linux/debian/control debian/DEBIAN/
          cp -r build/linux/x64/release/bundle/* debian/usr/local/bin/scratchql-creater/

      - name: Build Debian package
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //g')
          dpkg-deb --build --root-owner-group debian scratchql-creater_${VERSION}_amd64.deb

      
        

      - name: Upload Debian package to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //g')
          gh release upload "v$VERSION" scratchql-creater_${VERSION}_amd64.deb

  build-macos:
    name: Build macOS
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        uses: Oberhauser-Dev/flutter-release-action@v0
        with:
          token: ${{ github.token }}
          dry-run: false
          app-name: 'scratchql-creator'
          app-version: ${{ needs.check-version.outputs.version }}
          tag: v${{ needs.check-version.outputs.version }}
          build-type: 'macos'

  build-windows:
    name: Build Windows
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        uses: Oberhauser-Dev/flutter-release-action@v0
        with:
          token: ${{ github.token }}
          dry-run: false
          app-name: 'scratchql-creator'
          app-version: ${{ needs.check-version.outputs.version }}
          tag: v${{ needs.check-version.outputs.version }}
          build-type: 'windows'

  build-web:
    name: Build Web
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        uses: Oberhauser-Dev/flutter-release-action@v0
        with:
          token: ${{ github.token }}
          dry-run: false
          app-name: 'scratchql-creator'
          app-version: ${{ needs.check-version.outputs.version }}
          tag: v${{ needs.check-version.outputs.version }}
          build-type: 'web'

  verify-builds:
    name: Verify All Builds Complete
    needs: [check-version, build-linux, build-macos, build-windows, build-web]
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Release v${{ needs.check-version.outputs.version }} completed
        run: echo "All platform builds completed"