name: nodeql
description: Local-first visual SQL learning and development desktop application.
publish_to: 'none'
version: 0.3.01+01

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  crypto: ^3.0.6
  flutter_riverpod: ^2.6.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  go_router: ^17.3.0
  http: ^1.6.0
  file_picker: ^8.3.7
  package_info_plus: ^9.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  sqlite3: ^3.3.3
  url_launcher: ^6.3.2
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  flutter_launcher_icons: ^0.14.4
  freezed: ^4.0.0-dev.3
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/translations/

flutter_launcher_icons:
  image_path: assets/appicon/icon.png
  android: true
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: assets/appicon/icon.png
  web:
    generate: true
    image_path: assets/appicon/icon.png
    background_color: "#0175C2"
    theme_color: "#0175C2"
  windows:
    generate: true
    image_path: assets/appicon/icon.png
    icon_size: 256
